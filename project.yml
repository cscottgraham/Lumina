# XcodeGen spec — generates Lumina.xcodeproj on a Mac.
#   brew install xcodegen && xcodegen generate
# Then: open Lumina.xcodeproj  (see docs/BUILD_ON_MAC.md)
name: Lumina
options:
  bundleIdPrefix: com.lumina
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  # Pin the generated project's file format to one Xcode 15.4 (the CI runner)
  # can open — newest XcodeGen otherwise emits the Xcode 16 format
  # (objectVersion 77) and xcodebuild refuses the project.
  xcodeVersion: "15.4"

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "" # ← set your Apple Developer Team ID here
    CODE_SIGN_STYLE: Automatic
    ENABLE_PREVIEWS: true

targets:
  Lumina:
    type: application
    platform: iOS
    sources:
      - path: Lumina
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lumina.app
        # Generate the Info.plist from the INFOPLIST_KEY_* settings below —
        # required for code signing (the test host must be ad-hoc signed).
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark          # dark-mode-first
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Lumina records voice notes and audio you attach to your research."
        INFOPLIST_KEY_NSCameraUsageDescription: "Lumina captures photos and videos for your research subjects."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Lumina imports photos and videos into your research vault."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Lumina transcribes your voice notes on-device."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Lumina can tag captured items with where you were, so your research keeps its context."
        # Standard HTTPS-only encryption → exempt; declaring it skips the
        # export-compliance question that otherwise blocks TestFlight builds.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        # iCloud + CloudKit for local-first sync (enable the capabilities in Xcode too)
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
    entitlements:
      path: Lumina/Lumina.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.lumina.app
        com.apple.developer.icloud-services:
          - CloudKit
        # No aps-environment: we don't use push directly, and declaring
        # 'development' conflicts with App Store distribution profiles.

  LuminaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LuminaTests
    dependencies:
      - target: Lumina
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lumina.app.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Lumina.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Lumina"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  Lumina:
    build:
      targets:
        Lumina: all
        LuminaTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LuminaTests
